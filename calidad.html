<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Digital de Calidad e Inocuidad</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --light-bg: #f4f6f7;
            --white: #ffffff;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #333;
        }

        /* Pantalla de Inicio */
        #landing-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-align: center;
        }

        h1 { margin-bottom: 2rem; font-size: 1.8rem; padding: 0 20px; }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--white);
            color: var(--primary-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-main:hover { transform: scale(1.05); }

        /* Contenedor Principal */
        #app-container {
            display: none; /* Oculto al inicio */
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* Cabecera */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .user-info { font-size: 0.9rem; color: #666; }
        .btn-back {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Grid de Módulos */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--secondary-color);
        }

        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .card h3 { font-size: 1rem; margin: 0; }
        .card p { font-size: 0.8rem; color: #777; margin-top: 5px; }

        /* Lista de Registros */
        .list-item {
            background: var(--white);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--success-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        /* Formulario de Registro */
        .form-container {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        .btn-save { background: var(--success-color); color: white; }
        .btn-filter { background: var(--secondary-color); color: white; }
        .btn-history { background: #f39c12; color: white; }
        .btn-delete { background: var(--danger-color); color: white; }
        .btn-attach { background: #8e44ad; color: white; }

        /* Utilidades */
        .hidden { display: none !important; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--secondary-color); color: white; }

    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO -->
    <div id="landing-screen">
        <h1>SISTEMA DE GESTIÓN DIGITAL DE CALIDAD E INOCUIDAD</h1>
        <button class="btn-main" onclick="enterSystem()">INGRESAR</button>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="app-container">
        <!-- Cabecera Común -->
        <div class="header">
            <button class="btn-back" id="btn-back-global" onclick="goBack()" style="visibility: hidden;">← Volver</button>
            <div class="user-info">
                <span id="user-role-display">Rol: Responsable</span> | <span id="current-screen-name">Inicio</span>
            </div>
        </div>

        <!-- Contenedor Dinámico del Contenido -->
        <div id="dynamic-content"></div>
    </div>

    <script>
        // --- DATOS DEL SISTEMA (Estructura Jerárquica) ---
        const systemData = [
            {
                id: 1, title: "MÓDULO 1: Requisitos Sanitarios y Ambientales", icon: "🌿",
                submodules: [
                    { id: 1.1, title: "Control integral de plagas", records: ["Fumigación periódica", "Monitoreo de medidas preventivas", "Monitoreo de trampas", "Planes de acción"] },
                    { id: 1.2, title: "Limpieza y desinfección", records: ["Limpieza diaria", "Limpieza semanal", "Planes de acción"] },
                    { id: 1.3, title: "Manejo integral de residuos sólidos", records: ["Registro de condiciones de zonas", "Planes de acción"] },
                    { id: 1.4, title: "Abastecimiento de agua potable", records: ["Control de cloro y pH", "Inspección de suministro", "Limpieza tanque", "Planes de acción"] }
                ]
            },
            {
                id: 2, title: "MÓDULO 2: Requisitos para el Personal Manipulador", icon: "👷",
                submodules: [
                    { id: 2.1, title: "Lista de chequeo personal", records: ["Chequeo diario"] },
                    { id: 2.2, title: "Planes de acción", records: ["Plan general"] },
                    { id: 2.3, title: "Condición de salud", records: ["Registro por manipulador (Adjuntar archivo)"] }
                ]
            },
            {
                id: 3, title: "MÓDULO 3: Operaciones Claves en el Proceso", icon: "⚙️",
                submodules: [
                    { id: 3.1, title: "Proveedores materia prima", records: ["Criterios aceptación materia prima", "Criterios químicos", "Criterios empaque", "Criterios rotulado", "Listado proveedores", "Soportes"] },
                    { id: 3.2, title: "Muestreo", records: ["Registro de muestreo (Adjuntar)", "Plan de acción"] },
                    { id: 3.3, title: "Aseguramiento de calidad", records: ["Control fabricación", "Fabricación condimentos", "Control variables", "Liberación materia prima", "Bloqueo productos", "Inspección semanal planta", "Liberación producto", "Plan de acción", "PQR y plan", "Diagramas procesos", "Planes acción producción"] }
                ]
            },
            {
                id: 4, title: "MÓDULO 4: Equipos Requeridos", icon: "🔧",
                submodules: [
                    { id: 4.1, title: "Certificaciones equipos", records: ["Certificados material (Adjuntar)"] },
                    { id: 4.2, title: "Calibración equipos", records: ["Registro calibración", "Registro verificación"] },
                    { id: 4.3, title: "Mantenimiento equipos", records: ["Registro mantenimiento", "Reporte mantenimiento", "Reporte daños", "Plan de acción"] }
                ]
            },
            {
                id: 5, title: "MÓDULO 5: Verificación sobre el Producto", icon: "🚚",
                submodules: [
                    { id: 5.1, title: "Transporte de alimentos", records: ["Registro inspección diaria (Evidencia)", "Limpieza vehículo (Evidencia)", "Fumigación vehículo (Evidencia)", "Plan de acción"] },
                    { id: 5.2, title: "Trazabilidad, recall y devoluciones", records: ["Registro trazabilidad", "Averías y devoluciones", "Recall", "Plan de acción"] },
                    { id: 5.3, title: "Vida útil", records: ["Vida útil (Cargar archivos)"] }
                ]
            },
            {
                id: 6, title: "MÓDULO 6: Registros Sanitarios", icon: "📋",
                submodules: [
                    { id: 6.1, title: "Listado de registros por producto", records: ["Registro Producto A", "Registro Producto B"] } // Simulado
                ]
            },
            {
                id: 7, title: "MÓDULO 7: Tablas Nutricionales", icon: "🥗",
                submodules: [
                    { id: 7.1, title: "Listado tablas nutricionales", records: ["Tabla Producto A", "Tabla Producto B"] } // Simulado
                ]
            }
        ];

        // --- ESTADO DE LA APP ---
        let currentStep = { module: null, subModule: null, record: null };
        let currentRole = "responsable"; // 'responsable' o 'jefe_calidad'
        
        // --- FUNCIONES DE NAVEGACIÓN ---

        function enterSystem() {
            // Simulación de login simple. En producción, esto validaría usuario/pass
            const roleInput = prompt("Ingrese su rol (escriba 'jefe' para jefe de calidad, cualquier otra cosa para responsable):", "responsable");
            if (roleInput && roleInput.toLowerCase() === 'jefe') {
                currentRole = "jefe_calidad";
                document.getElementById('user-role-display').innerText = "Rol: Jefe de Calidad";
            } else {
                currentRole = "responsable";
                document.getElementById('user-role-display').innerText = "Rol: Responsable";
            }

            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            renderModules();
        }

        function goBack() {
            if (currentStep.record) {
                renderSubmoduleRecords(currentStep.module, currentStep.subModule);
                currentStep.record = null;
            } else if (currentStep.subModule) {
                renderModules(); // Volver a módulos principales
                currentStep.subModule = null;
                currentStep.module = null;
            }
        }

        function updateHeader(title) {
            document.getElementById('current-screen-name').innerText = title;
            const backBtn = document.getElementById('btn-back-global');
            if (currentStep.module || currentStep.subModule || currentStep.record) {
                backBtn.style.visibility = 'visible';
            } else {
                backBtn.style.visibility = 'hidden';
            }
        }

        // --- RENDERIZADO DE VISTAS ---

        function renderModules() {
            const container = document.getElementById('dynamic-content');
            let html = '<div class="grid-container">';
            
            systemData.forEach(mod => {
                html += `
                    <div class="card" onclick="openModule(${mod.id})">
                        <h3>${mod.icon} ${mod.title.toUpperCase()}</h3>
                        <p>${mod.submodules.length} Submódulos</p>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            updateHeader("Menú Principal");
        }

        function openModule(modId) {
            const mod = systemData.find(m => m.id === modId);
            currentStep.module = mod;
            
            const container = document.getElementById('dynamic-content');
            let html = '<div class="grid-container">';
            
            mod.submodules.forEach(sub => {
                html += `
                    <div class="card" style="border-left-color: var(--success-color);" onclick="openSubmodule(${modId}, ${sub.id})">
                        <h3>${sub.title}</h3>
                        <p>${sub.records.length} Registros</p>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            updateHeader(mod.title);
        }

        function openSubmodule(modId, subId) {
            const mod = systemData.find(m => m.id === modId);
            const sub = mod.submodules.find(s => s.id === subId);
            
            currentStep.module = mod;
            currentStep.subModule = sub;

            const container = document.getElementById('dynamic-content');
            let html = '<h3>Registros: ' + sub.title + '</h3><div class="list-container">';
            
            sub.records.forEach((rec, index) =>
