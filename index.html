<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Digital de Calidad e Inocuidad</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --light-bg: #f4f6f7;
            --white: #ffffff;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #333;
        }

        #landing-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-align: center;
        }

        h1 { margin-bottom: 2rem; font-size: 1.8rem; padding: 0 20px; }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--white);
            color: var(--primary-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-main:hover { transform: scale(1.05); }

        #app-container {
            display: none;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .user-info { font-size: 0.9rem; color: #666; }
        .btn-back {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--secondary-color);
        }

        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .card h3 { font-size: 1rem; margin: 0; }
        .card p { font-size: 0.8rem; color: #777; margin-top: 5px; }

        .list-item {
            background: var(--white);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--success-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .form-container {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        .btn-save { background: var(--success-color); color: white; }
        .btn-filter { background: var(--secondary-color); color: white; }
        .btn-history { background: #f39c12; color: white; }
        .btn-delete { background: var(--danger-color); color: white; }
        .btn-attach { background: #8e44ad; color: white; }

        .hidden { display: none !important; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--secondary-color); color: white; }
    </style>
</head>
<body>

    <div id="landing-screen">
        <h1>SISTEMA DE GESTIÓN DIGITAL DE CALIDAD E INOCUIDAD</h1>
        <button class="btn-main" onclick="enterSystem()">INGRESAR</button>
    </div>

    <div id="app-container">
        <div class="header">
            <button class="btn-back" id="btn-back-global" onclick="goBack()" style="visibility: hidden;">← Volver</button>
            <div class="user-info">
                <span id="user-role-display">Rol: Responsable</span> | <span id="current-screen-name">Inicio</span>
            </div>
        </div>
        <div id="dynamic-content"></div>
    </div>

    <script>
        let currentStep = { module: null, subModule: null, record: null };
        let currentRole = "responsable";

        const systemData = [
            { id: 1, title: "MÓDULO 1: Requisitos Sanitarios y Ambientales", icon: "🌿", submodules: [{ id: 1.1, title: "Control integral de plagas", records: ["Fumigación periódica", "Monitoreo de medidas preventivas", "Monitoreo de trampas", "Planes de acción"] }, { id: 1.2, title: "Limpieza y desinfección", records: ["Limpieza diaria", "Limpieza semanal", "Planes de acción"] }] },
            { id: 2, title: "MÓDULO 2: Requisitos para el Personal", icon: "👷", submodules: [{ id: 2.1, title: "Lista de chequeo", records: ["Chequeo diario"] }] },
            { id: 3, title: "MÓDULO 3: Operaciones Claves", icon: "⚙️", submodules: [{ id: 3.1, title: "Proveedores", records: ["Criterios aceptación"] }] },
            { id: 4, title: "MÓDULO 4: Equipos", icon: "🔧", submodules: [{ id: 4.1, title: "Certificaciones", records: ["Certificados"] }] },
            { id: 5, title: "MÓDULO 5: Verificación", icon: "🚚", submodules: [{ id: 5.1, title: "Transporte", records: ["Inspección diaria"] }] },
            { id: 6, title: "MÓDULO 6: Registros Sanitarios", icon: "📋", submodules: [{ id: 6.1, title: "Registros", records: ["Listado"] }] },
            { id: 7, title: "MÓDULO 7: Tablas Nutricionales", icon: "🥗", submodules: [{ id: 7.1, title: "Tablas", records: ["Listado"] }] }
        ];

        function enterSystem() {
            const roleInput = prompt("Ingrese su rol (jefe o responsable):", "responsable");
            currentRole = (roleInput && roleInput.toLowerCase() === 'jefe') ? "jefe_calidad" : "responsable";
            document.getElementById('user-role-display').innerText = "Rol: " + (currentRole === "jefe_calidad" ? "Jefe de Calidad" : "Responsable");
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            renderModules();
        }

        function goBack() {
            if (currentStep.record) {
                renderSubmoduleRecords(currentStep.module, currentStep.subModule);
                currentStep.record = null;
            } else if (currentStep.subModule) {
                renderModules();
                currentStep.subModule = null;
                currentStep.module = null;
            }
        }

        function updateHeader(title) {
            document.getElementById('current-screen-name').innerText = title;
            const backBtn = document.getElementById('btn-back-global');
            backBtn.style.visibility = (currentStep.module || currentStep.subModule) ? 'visible' : 'hidden';
        }

        function renderModules() {
            const container = document.getElementById('dynamic-content');
            let html = '<div class="grid-container">';
            systemData.forEach(mod => {
                html += `<div class="card" onclick="openModule(${mod.id})"><h3>${mod.icon} ${mod.title.toUpperCase()}</h3><p>${mod.submodules.length} Submódulos</p></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            updateHeader("Menú Principal");
        }

        function openModule(modId) {
            const mod = systemData.find(m => m.id === modId);
            currentStep.module = mod;
            const container = document.getElementById('dynamic-content');
            let html = '<div class="grid-container">';
            mod.submodules.forEach(sub => {
                html += `<div class="card" style="border-left-color: var(--success-color);" onclick="openSubmodule(${modId}, ${sub.id})"><h3>${sub.title}</h3><p>${sub.records.length} Registros</p></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            updateHeader(mod.title);
        }

        function openSubmodule(modId, subId) {
            const mod = systemData.find(m => m.id === modId);
            const sub = mod.submodules.find(s => s.id === subId);
            currentStep.module = mod;
            currentStep.subModule = sub;
            const container = document.getElementById('dynamic-content');
            let html = '<h3>Registros: ' + sub.title + '</h3><div class="list-container">';
            sub.records.forEach((rec, index) => {
                html += `<div class="list-item" onclick="openRecord('${rec}')"><span>${rec}</span> <span>➡️</span></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            updateHeader(sub.title);
        }

        function openRecord(recordName) {
            currentStep.record = recordName;
            const container = document.getElementById('dynamic-content');
            container.innerHTML = `
                <div class="form-container">
                    <h3>Registro: ${recordName}</h3>
                    <div class="form-group"><label>Fecha:</label><input type="date"></div>
                    <div class="form-group"><label>Observaciones:</label><textarea rows="4"></textarea></div>
                    <div class="form-group"><label>Evidencia (Foto/Archivo):</label><input type="file"></div>
                    <div class="action-bar">
                        <button class="btn btn-save" onclick="alert('¡Registro Guardado! (Demo)')">Guardar</button>
                        <button class="btn btn-attach" onclick="alert('Adjuntar archivo')">Adjuntar</button>
                        <button class="btn btn-history" onclick="alert('Historial')">Historial</button>
                        <button class="btn btn-delete" onclick="alert('Borrar')">Borrar</button>
                    </div>
                </div>
            `;
            updateHeader(recordName);
        }
    </script>
</body>
</html>
